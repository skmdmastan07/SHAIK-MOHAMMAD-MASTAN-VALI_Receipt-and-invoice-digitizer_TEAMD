<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="forgotpassword.css">
</head>
<body>

<div class="container">
    <div class="forgot_password">
        <div>
            <h2>Forgot Password</h2>

            <form action="http://127.0.0.1:5000/forgot-password" method="post">

                <input
                    type="email"
                    name="email"
                    class="input-box"
                    placeholder="Enter your email"
                    required
                >
                <br><br>

                <button type="submit" class="send_email">
                    Send reset mail
                </button>
            </form>

            <br>
            <a href="./login_page.html">Back to Login</a>
        </div>
    </div>
</div>

</body>
</html>
