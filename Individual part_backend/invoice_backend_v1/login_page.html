<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="login_page.css">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <h2 class="logo">Receipt and Invoice Digitizer</h2>

        <form action="http://127.0.0.1:5000/login" method="post">

            <input type="text" name="username" placeholder="Username or Email" class="input-box" required>
            <input type="password" name="password" placeholder="Password" class="input-box" required>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="links">
            <a href="forgotpassword.html">Forgot Password?</a>
            <a href="register.html">Sign Up</a>

        </div>

        <p class="or-text">or you can sign in with</p>

        <div class="social-login">
            <button class="social google">G</button>
        </div>
    </div>
</div>

</body>
</html>
