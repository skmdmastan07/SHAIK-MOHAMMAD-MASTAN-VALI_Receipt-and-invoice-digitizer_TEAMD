<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Receipt & Invoice Digitizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
     <script src="https://unpkg.com/i18next@23/dist/umd/i18next.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(180deg, #f5d5d8 0%, #e8b4b8 50%, #d4989c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Big title above card */
        .auth-container {
            width: 100%;
            max-width: 420px;   /* same as card */
        }
        .page-header {
            text-align: left;
            margin-bottom: 20px;
            padding-left:8px;
        }

        .page-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #2d2d2d;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .page-header p {
            font-size: 15px;
            color: #4a4a4a;
            font-weight: 500;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(219, 39, 119, 0.15);
            border: 1px solid rgba(219, 39, 119, 0.1);
        }

        .card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #db2777;
            margin-bottom: 8px;
        }

        .card .subtitle {
            font-size: 14px;
            color: #6b7280;
            font-weight: 400;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a4a4a;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f3b8cd;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            color: #2d2d2d;
            background: white;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }

        .input-group input:focus {
            outline: none;
            border-color: #db2777;
            background: #fff5f8;
            box-shadow: 0 0 0 3px rgba(219, 39, 119, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #db2777;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #be185d;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(219, 39, 119, 0.35);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            font-size: 13px;
            color: #db2777;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #be185d;
            text-decoration: underline;
        }

        /* Success state */
        .success-box {
            display: none;
            text-align: center;
            padding: 20px 0 8px;
        }

        .success-box .check {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .success-box p {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
        }

        .success-box strong {
            color: #2d2d2d;
        }

        @media (max-width: 480px) {
            .page-header h1 { font-size: 36px; }
            .card { padding: 28px 24px; }
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="page-header">
        <h1 data-i18n="title">Receipt & Invoice Digitizer</h1>
        <p data-i18n="subtitle"> AI-powered receipt analysis and storage</p>
    </div>

    <div class="card">
        <h2 data-i18n="forgot_title">Forgot password?</h2>
        <p   data-i18n="forgot_subtitle" class="subtitle">No worries — enter your email and we'll send you a reset link.</p>

        <form id="forgotPasswordForm">
            <div class="input-group">
                <label data-i18n="email_label" >Email Address</label>
                <input data-i18n-placeholder="email_placeholder" type="email" id="email" placeholder="you@example.com" required>
            </div>

            <button data-i18n="send_link" type="submit" class="btn" id="submitBtn">Send Reset Link</button>
        </form>

        <!-- Success message shown after submit -->
        <div class="success-box" id="successBox">
            <div class="check">📬</div>
            <p>We sent a reset link to<br><strong id="sentEmail"></strong><br><br>Check your inbox and follow the instructions.</p>
        </div>

        <a href="/" class="back-link" data-i18n="back_to_login">← Back to Sign In</a>
    </div>
</div>

   

<script>
const DEFAULT_LANG = "en";
const savedLang = localStorage.getItem("app_lang") || DEFAULT_LANG;

i18next.init(
  { lng: savedLang, fallbackLng: DEFAULT_LANG },
  async () => {
    const r = await fetch(`/static/i18n/${savedLang}.json`);
    const d = await r.json();

    i18next.addResourceBundle(savedLang, "translation", d, true, true);
    i18next.changeLanguage(savedLang);

    document.querySelectorAll("[data-i18n]").forEach(el => {
      el.innerText = i18next.t(el.dataset.i18n);
    });

    document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
      el.placeholder = i18next.t(el.dataset.i18nPlaceholder);
    });
  }
);
</script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn   = document.getElementById('submitBtn');
            const email = document.getElementById('email').value;

            btn.disabled    = true;
            btn.textContent = 'Sending…';

            const formData = new FormData();
            formData.append('email', email);

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    // Show success state instead of alert
                    document.getElementById('forgotPasswordForm').style.display = 'none';
                    document.getElementById('sentEmail').textContent = email;
                    document.getElementById('successBox').style.display = 'block';
                    btn.style.display = 'none';
                } else {
                    alert(data.message || 'Email not found');
                    btn.disabled    = false;
                    btn.textContent = 'Send Reset Link';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
                btn.disabled    = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
