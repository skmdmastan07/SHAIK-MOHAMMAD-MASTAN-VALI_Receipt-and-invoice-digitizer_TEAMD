<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Receipt & Invoice Digitizer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: linear-gradient(180deg, #f5d5d8 0%, #e8b4b8 50%, #d4989c 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.auth-container {
    width: 100%;
    max-width: 420px;
}

/* Header */
.page-header {
    text-align: left;
    margin-bottom: 20px;
    padding-left: 8px;
}

.page-header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #2d2d2d;
    letter-spacing: -2px;
    margin-bottom: 6px;
}

.page-header p {
    font-size: 15px;
    color: #4a4a4a;
    font-weight: 500;
}

/* Card */
.card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(219, 39, 119, 0.15);
    border: 1px solid rgba(219, 39, 119, 0.1);
}

.card h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #db2777;
    margin-bottom: 24px;
}

/* Inputs */
.input-group {
    margin-bottom: 16px;
}

.input-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #4a4a4a;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
}

.input-group input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid #f3b8cd;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    color: #2d2d2d;
    transition: all 0.3s ease;
}

.input-group input:focus {
    outline: none;
    border-color: #db2777;
    background: #fff5f8;
    box-shadow: 0 0 0 3px rgba(219, 39, 119, 0.1);
}

/* Button */
.btn {
    width: 100%;
    padding: 14px;
    background: #db2777;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.3s ease;
}

.btn:hover {
    background: #be185d;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(219, 39, 119, 0.35);
}

.footer-text {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #6b7280;
}

.footer-text a {
    color: #db2777;
    text-decoration: none;
    font-weight: 600;
}

.footer-text a:hover {
    text-decoration: underline;
}

/* Mobile */
@media (max-width: 480px) {
    .page-header h1 {
        font-size: 36px;
    }
    .card {
        padding: 28px 24px;
    }
}
</style>
</head>


<body>

<div class="auth-container">

    <div class="page-header">
        <h1>Receipt & Invoice Digitizer</h1>
        <p>AI-powered receipt analysis and storage</p>
    </div>

    <div class="card">
        <h2>Reset Password</h2>

        <!-- 🔹 CONNECTED TO FLASK API -->
        <form action="/api/reset-password" method="POST" onsubmit="return validatePassword()">

            <div class="input-group">
                <label data-i18n="username_label">Username or Email</label>
                <input 
                    type="text"
                    name="username"
                    placeholder="Enter username or email"
                    required>
            </div>

            <div class="input-group">
                <label>New Password</label>
                <input 
                    type="password"
                    name="new_password"
                    id="new_password"
                    placeholder="Enter new password"
                    required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input 
                    type="password"
                    id="confirm_password"
                    placeholder="Confirm new password"
                    required>
            </div>

            <button type="submit" class="btn">Reset Password</button>
        </form>

        <p class="footer-text">
            Remember your password?
            <a href="/">Sign in</a>
        </p>
    </div>

</div>

<!-- 🔹 SIMPLE FRONTEND PASSWORD CHECK -->
<script>
function validatePassword() {
    const newPass = document.getElementById("new_password").value;
    const confirmPass = document.getElementById("confirm_password").value;

    if (newPass !== confirmPass) {
        alert("Passwords do not match!");
        return false;
    }
    return true;
}
</script>

</body>
</html>
