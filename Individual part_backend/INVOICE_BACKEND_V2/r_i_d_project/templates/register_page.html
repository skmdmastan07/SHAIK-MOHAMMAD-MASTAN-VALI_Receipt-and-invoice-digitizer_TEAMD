<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Receipt & Invoice Digitizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/i18next@23/dist/umd/i18next.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(180deg, #f5d5d8 0%, #e8b4b8 50%, #d4989c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Big title above card */
        .auth-container {
            width: 100%;
            max-width: 420px;   /* same as card */
        }
        .page-header {
            text-align: left;
            margin-bottom: 20px;
            padding-left:8px;
        }

        .page-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #2d2d2d;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .page-header p {
            font-size: 15px;
            color: #4a4a4a;
            font-weight: 500;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(219, 39, 119, 0.15);
            border: 1px solid rgba(219, 39, 119, 0.1);
        }

        .card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #db2777;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a4a4a;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f3b8cd;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            color: #2d2d2d;
            background: white;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }

        .input-group input:focus {
            outline: none;
            border-color: #db2777;
            background: #fff5f8;
            box-shadow: 0 0 0 3px rgba(219, 39, 119, 0.1);
        }

        /* Two-column row for name + phone */
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #db2777;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #be185d;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(219, 39, 119, 0.35);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6b7280;
        }

        .footer-text a {
            color: #db2777;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Password strength hint */
        .hint {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }

        @media (max-width: 480px) {
            .page-header h1 { font-size: 36px; }
            .card { padding: 28px 24px; }
            .input-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="page-header">
        <h1>Receipt & Invoice Digitizer</h1>
        <p>AI-powered receipt analysis and storage</p>
    </div>

    <div class="card">
        <h2 data-i18n="create_account" >Create account</h2>

        <form id="registerForm">
            <div class="input-group">
                <label  data-i18n="username_label" >Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label data-i18n="email_label" >Email</label>
                <input   data-i18n-placeholder="email_placeholder" type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label data-i18n="password_label" >Password</label>
                    <input data-i18n-placeholder="password_placeholder" type="password" id="password" placeholder="Create password" required>
                </div>
                <div class="input-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" placeholder="+91 00000 00000">
                </div>
            </div>

            <button   data-i18n="create_account_btn" type="submit" class="btn">Create Account</button>
        </form>

        <p class="footer-text">
            <span data-i18n="already_account">Already have an account?</span>
            <a href="/" data-i18n="signin_link">Sign in</a>
        </p>
    </div>
</div>
    <script>
const DEFAULT_LANG = "en";
const savedLang = localStorage.getItem("app_lang") || DEFAULT_LANG;

i18next.init(
  { lng: savedLang, fallbackLng: DEFAULT_LANG },
  async () => {
    const r = await fetch(`/static/i18n/${savedLang}.json`);
    const d = await r.json();

    i18next.addResourceBundle(savedLang, "translation", d, true, true);
    i18next.changeLanguage(savedLang);

    document.querySelectorAll("[data-i18n]").forEach(el => {
      el.innerText = i18next.t(el.dataset.i18n);
    });

    document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
      el.placeholder = i18next.t(el.dataset.i18nPlaceholder);
    });
  }
);
</script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('password', document.getElementById('password').value);
            formData.append('phone', document.getElementById('phone').value);

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    alert(data.message);
                    window.location.href = '/';
                } else {
                    alert(data.message || 'Registration failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            }
        });
    </script>
</body>
</html>
