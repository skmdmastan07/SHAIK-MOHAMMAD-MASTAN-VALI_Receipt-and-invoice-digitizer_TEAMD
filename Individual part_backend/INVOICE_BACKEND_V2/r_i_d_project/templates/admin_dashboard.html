<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Receipt Digitizer</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(180deg, #f5d5d8 0%, #e8b4b8 50%, #d4989c 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 60px 20px;
        }

        .header {
            margin-bottom: 50px;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            margin: 0;
            color: #2d2d2d;
        }

        .header p {
            margin-top: 10px;
            font-size: 18px;
            color: #444;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(219, 39, 119, 0.15);
            border: 1px solid rgba(219, 39, 119, 0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 70px rgba(219, 39, 119, 0.25);
        }

        .card h3 {
            margin: 0;
            font-size: 18px;
            color: #db2777;
            margin-bottom: 12px;
        }

        .card .number {
            font-size: 40px;
            font-weight: 700;
            color: #2d2d2d;
        }

        .chart-section {
            margin-top: 70px;
        }

        .chart-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(219,39,119,0.15);
            border: 1px solid rgba(219,39,119,0.1);
        }

        .chart-card h2 {
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 30px;
            color: #2d2d2d;
        }

        #statsChart {
            width: 100% !important;
            height: 400px !important;
        }

        .back-wrapper {
            margin-top: 50px;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            background: #db2777;
            color: white;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #be185d;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Admin Dashboard</h1>
        <p>Welcome, {{ session.get('username') }}</p>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="card">
            <h3>Total Users</h3>
            <div class="number">{{ total_users }}</div>
        </div>

        <div class="card">
            <h3>Total Uploads</h3>
            <div class="number">{{ total_uploads }}</div>
        </div>

        <div class="card">
            <h3>Total Processed Files</h3>
            <div class="number">{{ total_processed }}</div>
        </div>
    </div>

    <!-- Chart Section -->
    <div class="chart-section">
        <div class="chart-card">
            <h2>System Analytics Overview</h2>
            <canvas id="statsChart"></canvas>
        </div>
    </div>

    <!-- Back Button -->
    <div class="back-wrapper">
        <a href="/" class="back-btn">← Back to Dashboard</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const ctx = document.getElementById("statsChart").getContext("2d");

    new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Total Users", "Total Uploads", "Total Processed Files"],
            datasets: [{
                label: "System Overview",
                data: [{{ total_users }}, {{ total_uploads }}, {{ total_processed }}],
                backgroundColor: [
                    "rgba(219, 39, 119, 0.85)",
                    "rgba(190, 24, 93, 0.85)",
                    "rgba(157, 23, 77, 0.85)"
                ],
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: "#2d2d2d",
                    titleColor: "#fff",
                    bodyColor: "#fff"
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: {
                        color: "rgba(0,0,0,0.05)"
                    },
                    ticks: {
                        color: "#444"
                    }
                },
                x: {
                    grid: { display: false },
                    ticks: {
                        color: "#444",
                        font: { weight: "600" }
                    }
                }
            }
        }
    });

});
</script>

</body>
</html>
