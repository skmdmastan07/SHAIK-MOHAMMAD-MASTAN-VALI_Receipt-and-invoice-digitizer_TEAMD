<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Receipt & Invoice Digitizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #ffe7f1 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            margin-bottom: 50px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 32px;
            margin-top: 28px;
            width: 100%;
        }

        .page-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: #f22b84;
            letter-spacing: -2px;
            margin-bottom: 8px;
            font-size: 65px;
            line-height: 1.1;
        }

        .page-header p {
            font-size: 16px;
            color: #4a4a4a;
            font-weight: 500;
        }

        .auth-container {
            width: 100%;
            max-width: 460px;
        }

        .card {
            position: relative;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(219, 39, 119, .15);
            border: 1px solid rgba(219, 39, 119, .1);
        }

        .card * {
            position: relative;
            z-index: 1;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('/static/back_drop/pattern-2.png');
            background-repeat: repeat;
            background-size: 400px auto;
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }

        .card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #f22b84;
            margin-bottom: 8px;
        }

        .card .subtitle {
            font-size: 14px;
            color: #6b7280;
            font-weight: 400;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #4a4a4a;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f3b8cd;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            color: #2d2d2d;
            background: white;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: #9ca3af;
            font-weight: 300;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f22b84;
            background: #fff5f8;
            box-shadow: 0 0 0 3px rgba(219, 39, 119, .1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff5ba2 30%, #dc2c78 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(252, 32, 124, 0.683);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            font-size: 13px;
            color: #f22b84;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #be185d;
            text-decoration: underline;
        }

        /* Success state */
        .success-box {
            display: none;
            text-align: center;
            padding: 20px 0 8px;
        }

        .success-box .check {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .success-box p {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
        }

        .success-box strong {
            color: #2d2d2d;
        }

        @media (max-width: 480px) {
            .page-header h1 { font-size: 48px; }
            .card { padding: 28px 24px; }
        }
    </style>
</head>
<body>

<div class="page-header">
    <h1>Receipt & Invoice <br>Digitizer</h1>
    <p>AI-powered receipt analysis and storage</p>
</div>

<div class="auth-container">
    <div class="card">
        <h2>Forgot password?</h2>
        <p class="subtitle">No worries — enter your email and we'll send you a reset link.</p>

        <form id="forgotPasswordForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">Send Reset Link</button>
        </form>

        <!-- Success message shown after submit -->
        <div class="success-box" id="successBox">
            <div class="check">📬</div>
            <p>We sent a reset link to<br><strong id="sentEmail"></strong><br><br>Check your inbox and follow the instructions.</p>
        </div>

        <a href="/" class="back-link">← Back to Sign In</a>
    </div>
</div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn   = document.getElementById('submitBtn');
            const email = document.getElementById('email').value;

            btn.disabled    = true;
            btn.textContent = 'Sending…';

            const formData = new FormData();
            formData.append('email', email);

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    // Show success state instead of alert
                    document.getElementById('forgotPasswordForm').style.display = 'none';
                    document.getElementById('sentEmail').textContent = email;
                    document.getElementById('successBox').style.display = 'block';
                    btn.style.display = 'none';
                } else {
                    alert(data.message || 'Email not found');
                    btn.disabled    = false;
                    btn.textContent = 'Send Reset Link';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
                btn.disabled    = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
