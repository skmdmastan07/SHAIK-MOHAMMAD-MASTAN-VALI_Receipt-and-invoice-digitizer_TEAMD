<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Receipt & Invoice Digitizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #ffe7f1 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            margin-bottom: 50px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 32px;
            margin-top: 28px;
            width: 100%;
        }

        .page-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: #f22b84;
            letter-spacing: -2px;
            margin-bottom: 8px;
            font-size: 65px;
            line-height: 1.1;
        }

        .page-header p {
            font-size: 16px;
            color: #4a4a4a;
            font-weight: 500;
        }

        .auth-container {
            width: 100%;
            max-width: 460px;
        }

        .card {
            position: relative;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(219, 39, 119, .15);
            border: 1px solid rgba(219, 39, 119, .1);
        }

        .card * {
            position: relative;
            z-index: 1;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('/static/back_drop/pattern-2.png');
            background-repeat: repeat;
            background-size: 400px auto;
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }

        .card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #f22b84;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #4a4a4a;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f3b8cd;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            color: #2d2d2d;
            background: white;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: #9ca3af;
            font-weight: 300;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f22b84;
            background: #fff5f8;
            box-shadow: 0 0 0 3px rgba(219, 39, 119, .1);
        }

        /* Two-column row for password + phone */
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff5ba2 30%, #dc2c78 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(252, 32, 124, 0.683);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6b7280;
        }

        .footer-text a {
            color: #f22b84;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            color: #be185d;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .page-header h1 { font-size: 48px; }
            .card { padding: 28px 24px; }
            .input-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="page-header">
    <h1>Receipt & Invoice <br>Digitizer</h1>
    <p>AI-powered receipt analysis and storage</p>
</div>

<div class="auth-container">
    <div class="card">
        <h2>Create account</h2>

        <form id="registerForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create password" required>
                </div>
                <div class="input-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" placeholder="+91 00000 00000">
                </div>
            </div>

            <button type="submit" class="btn">Create Account</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="/">Sign in</a>
        </p>
    </div>
</div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('password', document.getElementById('password').value);
            formData.append('phone', document.getElementById('phone').value);

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    alert(data.message);
                    window.location.href = '/';
                } else {
                    alert(data.message || 'Registration failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            }
        });
    </script>
</body>
</html>
